name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'version (e.g.: 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Windows amd64
        run: |
          mkdir -p build
          GOOS=windows GOARCH=amd64 go build -o build/max2tg-windows-amd64.exe main.go

      - name: Build Linux amd64
        run: |
          mkdir -p build
          GOOS=linux GOARCH=amd64 go build -o build/max2tg-linux-amd64 main.go

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Release ${{ inputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            build/max2tg-windows-amd64.exe
            build/max2tg-linux-amd64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}